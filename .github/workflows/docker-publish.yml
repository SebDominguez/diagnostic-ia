name: docker-publish

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'        # pas de build quand je change une virgule dans un markdown
      - '.gitignore'

jobs:
  pytest:                              # garde-fou : pas de publication si les tests cassent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Generate model artifact
        run: python ../scripts/train_export.py

      - name: Run pytest
        run: pytest -v

  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - name: Lire APP_VERSION depuis .env.example
        run: |
          source .env.example
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate model artifact   # pour que l'image API embarque le modèle
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          python scripts/train_export.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/exam-ia-api:latest
            ${{ secrets.DOCKER_USERNAME }}/exam-ia-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/exam-ia-api:${{ env.APP_VERSION }}

      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/exam-ia-app:latest
            ${{ secrets.DOCKER_USERNAME }}/exam-ia-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/exam-ia-app:${{ env.APP_VERSION }}
