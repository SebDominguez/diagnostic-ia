services:
  api:
    build: api
    ports:
      - "${FASTAPI_PORT:-8080}:${FASTAPI_PORT:-8080}"
    environment:
      FASTAPI_PORT: ${FASTAPI_PORT:-8080}
      MODEL_OUT_DIR: /app/model  # cible d'écriture du réentraînement (= dossier lu par l'API)
    volumes:
      - ./scripts:/scripts:ro      # rend la route /retrain opérationnelle dans le conteneur
      - ./data:/data:ro            # données d'entraînement lues par train_export.py
      - ./api/model:/app/model     # modèle persistant (réentraînement visible côté hôte)

  app:
    build: app
    ports:
      - "${STREAMLIT_PORT:-8502}:8501"  # 8501 deja occupe sur cette machine -> expose sur l'hote en 8502
    depends_on:
      - api
    environment:
      API_URL: http://api:${FASTAPI_PORT:-8080}/
    volumes:
      - ./logs:/app/logs  # logs loguru (Streamlit écrit dans /app/logs/app.log)

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:${GRAFANA_PORT:-3000}"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:${NODE_EXPORTER_PORT:-9100}"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:${UPTIME_KUMA_PORT:-3001}"
    volumes:
      - ./uptime-kuma:/app/data